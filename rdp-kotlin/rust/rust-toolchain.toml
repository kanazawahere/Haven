[toolchain]
# Pinned (not "stable") so the compiler that builds the shipped RDP .so is
# deterministic. A directory-scoped rust-toolchain.toml overrides the global
# `rustup default`, so "stable" here would float per-runner/per-day. 1.89.0 is
# the floor that compiles our IronRDP deps: ironrdp-graphics 0.7.0 uses
# `integer_sign_cast` (stabilised in 1.87), so anything < 1.87 hard-errors
# (E0658, rust-lang/rust#125882). Keep CI's `rustup default` (setup-toolchain)
# on the same version; raise this when a cargo bump needs a newer compiler.
channel = "1.89.0"
targets = ["aarch64-linux-android", "x86_64-linux-android", "armv7-linux-androideabi"]
