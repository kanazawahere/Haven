name: Set up Haven toolchain
description: >
  Install and cache the full build toolchain — JDK 17, Android SDK/NDK/CMake,
  Go + gomobile, Rust + cargo-ndk — shared by the CI and Release workflows.
  Everything downloadable is cached; only the toolchain install steps that
  can't be cached (setup-java, setup-android, setup-go) re-run each time,
  but those complete in seconds off the runner image.

runs:
  using: composite
  steps:
    # Free ~25GB of preinstalled software we don't use so Android SDK + NDK +
    # Go + Rust + gradle caches fit on the runner disk.
    - name: Free disk space
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # v1.3.1
      with:
        tool-cache: false
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install glibc cross-compilers for wayvnc shim
      shell: bash
      # core/local's buildWayvncShim Gradle task needs glibc-targeted
      # aarch64 + x86_64 C compilers — the wayvnc capture-fallback shim
      # runs inside the proot rootfs alongside glibc-based wayvnc, not
      # on Android. The NDK's bionic libc is incompatible. Same package
      # the F-Droid recipe installs at `sudo apt: gcc-aarch64-linux-gnu`.
      #
      # `libc6-dev-arm64-cross` and `libc6-dev-amd64-cross` ship the
      # multi-arch glibc headers (e.g. bits/wordsize.h that pulls in
      # via features-time64.h on Debian trixie) — the GHA Ubuntu image
      # only has the native-arch libc6-dev, and `jlumbroso/free-disk-space`
      # below strips even more. Without these, the cross gcc fails at
      # compile time with "bits/wordsize.h: No such file or directory".
      run: |
        # The runner image ships packages.microsoft.com apt sources
        # (azure-cli + microsoft-prod) that intermittently serve corrupt
        # InRelease files ("Clearsigned file isn't valid, got 'NOSPLIT'"),
        # failing this unwrapped apt-get update with exit 100 — two CI runs
        # on 2026-07-07 alone. The cross-compilers below come from the
        # Ubuntu archive, so drop the third-party sources instead of
        # letting them flake the build.
        sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/azure-cli*
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          gcc-aarch64-linux-gnu libc6-dev-arm64-cross \
          gcc-x86-64-linux-gnu libc6-dev-amd64-cross \
          gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

    # Only install the NDK we pin in per-module ndkVersion
    # (core/local + termlib/lib: 29.0.14206865, r29 stable). F-Droid's
    # buildserver no longer pre-installs NDKs in the Docker image —
    # fdroidserver.common.auto_install_ndk fetches whatever the
    # manifest's ndk: field requests via sdkmanager on demand. Bumped
    # off r28c (28.2.13676358) once Google moved that to the
    # unsupported list (GlassHaven/Haven#77).
    - name: Install SDK platforms 36+37, CMake, and NDK
      shell: bash
      run: sdkmanager "platforms;android-36" "platforms;android-37.0" "cmake;3.31.6" "ndk;29.0.14206865"

    - name: Set up Go toolchain
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: '1.26'
        cache-dependency-path: rclone-android/go/go.sum

    # gomobile + gobind get re-downloaded + recompiled on every clean run
    # (~1m). Cache the installed binaries in ~/go/bin keyed on the Go
    # version so repeat runs skip the `go install`.
    - name: Cache gomobile binaries
      id: gomobile-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/go/bin/gomobile
          ~/go/bin/gobind
        key: gomobile-${{ runner.os }}-go1.26-mobile20251021151156

    - name: Install gomobile
      if: steps.gomobile-cache.outputs.cache-hit != 'true'
      shell: bash
      # Pin gomobile/gobind to the golang.org/x/mobile pseudo-version recorded
      # in rclone-android/go/go.sum so the binding generator that produces the
      # shipped libgojni.so can't drift on a `@latest` resolve. Bump this in
      # lockstep with the go.sum entry (and the gomobile-cache key above).
      run: |
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20251021151156-188f512ec823
        go install golang.org/x/mobile/cmd/gobind@v0.0.0-20251021151156-188f512ec823

    # Tool-version pins below match fdroiddata's sh.haven.app.yml recipe —
    # the F-Droid buildserver is the authoritative environment (failing
    # there blocks the public release), so our CI mirrors its versions
    # rather than drifting ahead on `stable`. Update both places together.
    #
    # Rust note: the rdp-kotlin/rust build is governed by that crate's
    # rust-toolchain.toml (channel 1.89.0), which overrides the rustup default
    # below. We set the same version here so the global default and the
    # crate-scoped toolchain agree. ironrdp-graphics 0.7.0 needs >= 1.87
    # (integer_sign_cast), so don't lower this. F-Droid's recipe still does
    # `rustup default 1.85.0`, but its rdp build also obeys the toml — align
    # it to 1.89.0 in a follow-up for clarity.
    - name: Cache cargo-ndk
      id: cargo-ndk-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cargo/bin/cargo-ndk
        key: cargo-ndk-${{ runner.os }}-3.5.4

    - name: Set up Rust toolchain + cargo-ndk
      shell: bash
      run: |
        rustup default 1.89.0
        # Install every Android target up front (single-threaded). Leaving armv7
        # to the crates' rust-toolchain.toml `targets` auto-install let the
        # parallel rdp+spice cargo builds race to install rust-std-armv7 and hit
        # `detected conflict: …/rustlib/armv7-linux-androideabi/lib/…rlib`.
        rustup target add aarch64-linux-android x86_64-linux-android armv7-linux-androideabi
        if [ ! -x ~/.cargo/bin/cargo-ndk ]; then
          cargo install cargo-ndk --locked --version 3.5.4
        fi

    - name: Cache Gradle packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: gradle-${{ runner.os }}-

    # Gradle build cache (org.gradle.caching) — the task-output store that lets
    # test/lint/build/r8 stop each recompiling the whole tree. It MUST have a
    # rolling key: the dependency cache above is keyed on hashFiles, which is
    # stable across the many commits that don't touch build files, so its
    # snapshot of build-cache-1 freezes at first-populate and never picks up
    # later Kotlin changes. A run_id-suffixed key saves a fresh entry every run
    # and restore-keys falls back to the newest prior one — so it accumulates.
    # Restored after (and so wins over) the frozen copy inside the dep cache.
    - name: Cache Gradle build cache (task outputs)
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.gradle/caches/build-cache-1
        key: gradle-buildcache-${{ runner.os }}-${{ github.run_id }}
        restore-keys: gradle-buildcache-${{ runner.os }}-

    - name: Cache Cargo registry + rdp-kotlin target
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rdp-kotlin/rust/target
        key: cargo-${{ runner.os }}-${{ hashFiles('rdp-kotlin/rust/Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Grant execute permission for gradlew
      shell: bash
      run: chmod +x gradlew
