name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Nightly broad net: full lint, the R8 smoke, and an all-ABI build — the
  # slow/low-per-commit-signal work pulled off every main push (below) still
  # runs within 24h, so a lint regression or an x64/armv7-specific breakage
  # the arm64-only per-push build would miss is caught daily.
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  # Event-scoped so a main push doesn't cancel an in-flight nightly (both
  # resolve github.ref to refs/heads/main and would otherwise collide).
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

# Least-privilege floor. Every job here only reads the repo and uploads
# artifacts (which use the Actions runtime token, not GITHUB_TOKEN), so a
# read-only token is sufficient. Jobs needing more would declare their own.
permissions:
  contents: read

jobs:
  # Fast supply-chain guards — no toolchain, runs in parallel with the build
  # jobs and fails the run early if hardening regresses.
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      # Every external action must be pinned to a 40-char commit SHA. A bare
      # `@v1`/`@main`/`@master` ref is mutable and re-pointable (tj-actions
      # CVE-2025-30066 class). Local `./.github/actions/*` refs are exempt.
      - name: Assert external actions are SHA-pinned
        run: |
          if grep -rEn 'uses: [^.].+@(v[0-9]|main|master)' .github/workflows .github/actions; then
            echo "::error::Unpinned external action ref(s) above — pin to a 40-char SHA (# vX.Y.Z)."
            exit 1
          fi
      # Validate the gradle-wrapper.jar that CI actually executes against
      # Gradle's published checksums (wrapper-attack class). Submodule wrappers
      # aren't executed by CI, so the root jar is the one that matters.
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.1.1 (Node 24)

  # Three independent Gradle entry-points run as parallel jobs instead of
  # sequentially in one. Each restores the shared toolchain + caches from
  # the composite action; the second run of each job type reuses the cache
  # populated by the first, so the duplicated cache-restore cost is minimal.

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Run unit tests
        # :app uses ABI product flavors, so the unqualified `testDebugUnitTest`
        # matches no :app task and silently skips the agent/MCP unit tests.
        # Name the flavor task explicitly (arm64 only — unit tests are
        # flavor-agnostic) so they actually run in CI.
        run: ./gradlew testDebugUnitTest :app:testArm64DebugUnitTest
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 14

  # Fast source-level gates — no Android toolchain, no submodules, ~30s. Split
  # out of the lint job so they keep running on EVERY push (a version bump
  # without CHANGELOG notes, a hardcoded string, or stale i18n export must fail
  # fast) even though the slow lintDebug moved to PR + nightly.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - name: Check CHANGELOG has notes for the current version
        run: ./scripts/check-changelog.sh
      - name: Check for hardcoded UI strings (#210)
        run: ./scripts/check-i18n-hardcoded.sh
      - name: Check translation export is current
        # docs/i18n/strings.json feeds the Pages translation page. Regenerate
        # and fail if it drifted from the strings.xml sources (rerun
        # scripts/i18n_export.py and commit the result).
        run: |
          python3 scripts/i18n_export.py
          git diff --exit-code docs/i18n/strings.json

  # Full Android lint is slow (~13 min) and rarely catches a per-commit
  # regression the tests don't — so it runs on PRs and the nightly schedule,
  # not on every direct main push. The fast source gates above still run
  # per-push. github.event_name is 'push' only for direct main pushes.
  lint:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Run lint
        run: ./gradlew lintDebug
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: lint-results
          path: |
            **/build/reports/lint-results-debug.html
            **/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      # Build arm64 only in CI — the x64 flavor exists for emulator support
      # and Play Store fat distribution, not smoke-testing main. Cuts build
      # work roughly in half vs :app:assembleDebug (which expands to both).
      - name: Build arm64 debug APK
        run: ./gradlew :app:assembleArm64Debug
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: app-debug
          path: app/build/outputs/apk/arm64/debug/haven-*-arm64-debug.apk
          retention-days: 7

  # Nightly-only: build the ABIs the per-push `build` job skips (x64, armv7)
  # so an x64/armv7-specific compile or native-cross break surfaces within 24h
  # instead of only at release. arm64 is already covered per-push by `build`
  # (which also runs on the schedule), so it's not repeated here.
  nightly-abi:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: x64,   variant: X64 }
          - { abi: armv7, variant: Armv7 }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: Build ${{ matrix.abi }} debug APK
        run: ./gradlew :app:assemble${{ matrix.variant }}Debug

  # Debug builds don't run R8, so an R8 rename of a reflectively-loaded class
  # can ship a feature 100% broken in release while every debug check stays
  # green — exactly how the email feature broke once (R8 renamed
  # com.sun.mail.imap.IMAPSSLStore → getStore("imaps") threw, fixed v5.59.45).
  # This runs R8 on the release variant and asserts the by-name-loaded classes
  # survive (no keystore — minify precedes signing).
  #
  # Every published release is already R8-checked in release.yml (the assert
  # moved there), so this job is early-feedback only: PRs (catch a -keep
  # regression before merge) + the nightly schedule (the direct-main-push
  # safety net), skipping direct main pushes where it paced every run ~16 min.
  # github.event_name is 'push' only for direct main pushes.
  release-r8-smoke:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          submodules: false
      - uses: ./.github/actions/init-submodules-with-retry
      - uses: ./.github/actions/setup-toolchain
      - name: R8 the release variant
        run: ./gradlew :app:minifyArm64ReleaseWithR8
      - name: Assert reflectively-loaded classes survived R8
        run: ./scripts/check-r8-kept-classes.sh
